<!DOCTYPE html>
<html>
<head>
<title>Important Question</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ksjcb -->
<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#ffe6f0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

h1{
    color:#ff2e63;
}

.buttons{
    position:relative;
    width:300px;
    height:120px;
    margin-top:20px;
}

button{
    padding:12px 22px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#yes{
    background:#28a745;
    color:white;
}

#no{
    background:#dc3545;
    color:white;
    position:absolute;
    left:150px;
}

#message{
    font-size:22px;
    margin-top:25px;
    color:#333;
}

</style>
</head>

<body>

<h1>Important Question ❤️</h1>
<h3>Do you agree that your husband is the most handsome man alive? 😎</h3>

<div class="buttons">

<button id="yes">Yes ❤️</button>
<button id="no">No ❌</button>

</div>

<div id="message"></div>

<script>

const noBtn = document.getElementById("no");
const container = document.querySelector(".buttons");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function moveButton(){

const containerRect = container.getBoundingClientRect();

const x = Math.random() * (containerRect.width - 80);
const y = Math.random() * (containerRect.height - 40);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}

document.getElementById("yes").onclick = function(){
document.getElementById("message").innerHTML =
"Correct Answer! Smart wife detected 😍❤️";
}

</script>

</body>
</html>
