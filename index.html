<!DOCTYPE html>
<html>
<head>
<title>Important Question</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#ffe6f0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    color:#ff2e63;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#28a745;
    color:white;
}

#no{
    background:#dc3545;
    color:white;
    position:absolute;
}

#message{
    font-size:24px;
    margin-top:20px;
    color:#333;
}
</style>
</head>

<body>

<h1>Important Question ❤️</h1>
<h2>Do you agree that your husband is the most handsome man alive? 😎</h2>

<button id="yes">Yes ❤️</button>
<button id="no">No ❌</button>

<div id="message"></div>

<script>

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

document.getElementById("yes").onclick = function(){
    document.getElementById("message").innerHTML =
    "Correct Answer! Smart wife detected 😍❤️";
}

</script>

</body>
</html>
